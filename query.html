<!DOCTYPE html>
<html lang="zh-CN">

        * { box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #1976d2 0%, #42a5f5 50%, #64b5f6 100%); 
            min-height: 100vh; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        .container { max-width: 100%; margin: 0 auto; padding: 15px; }
        
        /* 头部标题 */
        .header { text-align: center; color: #fff; margin-bottom: 15px; padding-top: 10px; }
        .header h1 { font-size: 20px; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .header p { font-size: 12px; opacity: 0.9; margin: 0; }
        
        /* 切换按钮区域 */
        .tab-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab-btn {
            flex: 1;
            padding: 14px 10px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .tab-btn.active {
            background: #fff;
            color: #1976d2;
            border-color: #fff;
        }
        .tab-btn:hover:not(.active) {
            background: rgba(255,255,255,0.2);
        }
        
        /* 搜索卡片 */
        .search-card { 
            background: #fff; 
            border-radius: 16px; 
            padding: 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.12); 
            margin-bottom: 15px; 
        }
        .search-card h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #1976d2;
        }
        .search-input { 
            border: 2px solid #e3f2fd; 
            border-radius: 10px; 
            padding: 14px; 
            font-size: 16px; 
            transition: all 0.3s; 
        }
        .search-input:focus { 
            border-color: #1976d2; 
            box-shadow: 0 0 0 3px rgba(25,118,210,0.15); 
            outline: none; 
        }
        .search-btn { 
            background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%); 
            border: none; 
            border-radius: 10px; 
            padding: 14px; 
            color: #fff; 
            font-size: 16px; 
            font-weight: 600; 
            width: 100%; 
            margin-top: 12px; 
        }
        .search-btn:hover { 
            background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
            color: #fff; 
        }
        
        /* 设备查询区域 */
        .device-content {
            display: none;
        }
        .device-content.active {
            display: block;
        }
        
        /* 工单查询区域 */
        .order-content {
            display: none;
        }
        .order-content.active {
            display: block;
        }
        
        /* 查询结果卡片 */
        .result-card { 
            background: #fff; 
            border-radius: 16px; 
            padding: 16px; 
            box-shadow: 0 4px 16px rgba(0,0,0,0.08); 
            margin-bottom: 12px; 
        }
        .result-card .row-group {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            flex-wrap: wrap;
        }
        .result-card .row-group:last-child {
            border-bottom: none;
        }
        .result-card .row-label {
            font-size: 12px;
            color: #999;
            min-width: 70px;
        }
        .result-card .row-value {
            font-size: 14px;
            color: #333;
            flex: 1;
        }
        .result-card .dept-row {
            background: #e3f2fd;
            border-radius: 8px;
            padding: 10px 12px !important;
            margin-bottom: 8px;
        }
        .result-card .dept-row .row-label {
            color: #1976d2;
        }
        .result-card .dept-row .row-value {
            font-weight: 600;
            color: #1565c0;
        }
        .result-card .desc-row {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px !important;
        }
        .result-card .desc-row .row-label {
            color: #666;
        }
        .result-card .desc-row .row-value {
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .result-card .status-badge { 
            display: inline-block; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 600; 
        }
        .status-响应中 { background: #e3f2fd; color: #1976d2; }
        .status-审批中 { background: #f3e8ff; color: #6f42c1; }
        .status-已完成 { background: #e8f5e9; color: #2e7d32; }
        
        /* 空状态和加载 */
        .empty-state { 
            text-align: center; 
            padding: 50px 20px; 
            color: #fff; 
        }
        .empty-state svg { 
            width: 70px; 
            height: 70px; 
            margin-bottom: 15px; 
            opacity: 0.7; 
        }
        .empty-state p {
            margin: 5px 0;
            font-size: 14px;
        }
        .tips { 
            text-align: center; 
            color: rgba(255,255,255,0.85); 
            font-size: 12px; 
            margin-top: 15px; 
        }
        
        /* 设备查询样式 - 蓝色系 */
        .device-search-box { 
            background: #fff; 
            border-radius: 12px; 
            padding: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.12); 
            margin-bottom: 15px;
        }
        .device-search-box input { 
            width: 100%; 
            padding: 12px; 
            font-size: 16px; 
            border: 2px solid #e3f2fd; 
            border-radius: 10px; 
            outline: none; 
            box-sizing: border-box; 
            text-align: center; 
            margin-bottom: 10px; 
        }
        .device-search-box input:focus { border-color: #1976d2; }
        .device-search-box button { 
            width: 100%; 
            padding: 12px; 
            font-size: 16px; 
            background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%); 
            color: #fff; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600;
        }
        .device-search-box button:hover { 
            background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
        }
        .device-result { margin-top: 15px; }
        .device-org-header { background: #1976d2; color: #fff; padding: 12px 15px; border-radius: 10px 10px 0 0; }
        .device-org-header h2 { font-size: 17px; margin: 0; }
        .device-org-header p { font-size: 13px; margin: 5px 0 0 0; opacity: 0.9; }
        .device-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 0 0 10px 10px; overflow: hidden; }
        .device-table th, .device-table td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #eee; font-size: 11px; word-break: break-all; }

        .device-table td:nth-child(3), .device-table td:nth-child(4) { text-align: left; }
        .device-table th:nth-child(3), .device-table th:nth-child(4) { text-align: left; }
        .device-no-result { text-align: center; padding: 25px; color: #666; background: #fff; border-radius: 12px; }
        .device-suggestions { background: #fff; border-radius: 0 0 10px 10px; max-height: 200px; overflow-y: auto; display: none; }

        .device-suggestions div:hover { background: #f5f5f5; }
        .device-suggestions .code { color: #1976d2; font-weight: bold; }
        
        .sync-status {
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            margin-top: 8px;
        }
        
        @media (max-width: 576px) {
            .container { padding: 12px; }
            .header h1 { font-size: 18px; }

<body>
    <div class="container">
        <div class="header">
            <h1>网点运维信息查询</h1>
            <p>选择查询类型，快速获取信息</p>
        </div>
        
        <!-- 切换按钮 -->
        <div class="tab-switch">
            <button class="tab-btn active" onclick="switchTab('order')" id="btn-order">
                工单进度查询
            </button>
            <button class="tab-btn" onclick="switchTab('device')" id="btn-device">
                网点设备查询
            </button>
        </div>
        
        <!-- 工单进度查询内容 -->
        <div class="order-content active" id="order-content">
            <div class="search-card">
                <input type="text" class="form-control search-input" id="search-input" placeholder="请输入网点名称..." autocomplete="off">
                <button class="btn search-btn" onclick="searchOrders()">查 询</button>
            </div>
            <div class="tips">信息可能延迟，请尝试刷新显示</div>
            <div id="results"></div>
            <div class="sync-status" id="sync-status"></div>
        </div>
        
        <!-- 网点设备查询内容 -->
        <div class="device-content" id="device-content">
            <div class="device-search-box">
                <input type="text" id="device-search-input" placeholder="请输入网点名称" oninput="showDeviceSuggestions()" onkeyup="if(event.key==='Enter')searchDevice()">
                <div id="device-suggestions" class="device-suggestions"></div>
                <button onclick="searchDevice()">查询</button>
            </div>
            <div id="device-result" class="device-result"></div>
        </div>
    </div>

    <script>
        const FIXED_GIST_ID = '9ae11536cf7304baed38841a47c39385';
        let workorders = [];
        let currentTab = 'order';
        
        // 运维商联系方式
        function getVendorContacts() {
            let vendorContacts = {};
            try {
                const saved = localStorage.getItem('vendors_local');
                if (saved) {
                    const vendors = JSON.parse(saved);
                    const vendorMap = {};
                    vendors.forEach(function(v) {
                        if (!vendorMap[v.vendor]) {
                            vendorMap[v.vendor] = { contact: v.contact, phone: v.phone };
                        }
                    });
                    vendorContacts = vendorMap;
                }
            } catch(e) {}
            if (Object.keys(vendorContacts).length === 0) {
                vendorContacts = {
                    '广东奔腾达电子有限公司': { contact: '周洪啸', phone: '18176252256' },
                    '广州南天电脑系统有限公司': { contact: '梁太钦', phone: '13877130518' },
                    '广西百鼎科技有限责任公司': { contact: '莫德文', phone: '18278387986' },
                    '广西佳仕运网络科技有限公司': { contact: '陈剑云', phone: '13977300180' },
                    '广西南宁市源申隆贸易有限公司': { contact: '陈国斌', phone: '19077164249' },
                    '广西三弦建设工程有限公司': { contact: '曾海龙', phone: '13407718924' },
                    '桂林宇峰电子科技有限公司': { contact: '唐孝纯', phone: '18178357885' },
                    '北京信立合创信息技术有限公司': { contact: '谭因金', phone: '13878372640' },
                    '其他': { contact: '', phone: '' }
                };
            }
            return vendorContacts;
        }
        const vendorContacts = getVendorContacts();
        
        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            const btnOrder = document.getElementById('btn-order');
            const btnDevice = document.getElementById('btn-device');
            const orderContent = document.getElementById('order-content');
            const deviceContent = document.getElementById('device-content');
            
            if (tab === 'order') {
                btnOrder.classList.add('active');
                btnDevice.classList.remove('active');
                orderContent.classList.add('active');
                deviceContent.classList.remove('active');
            } else {
                btnDevice.classList.add('active');
                btnOrder.classList.remove('active');
                deviceContent.classList.add('active');
                orderContent.classList.remove('active');
            }
        }
        
        function showSyncStatus(msg) {
            document.getElementById('sync-status').textContent = msg;
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const saved = localStorage.getItem('workorders_query');
            if (saved) {
                try {
                    workorders = JSON.parse(saved);
                    renderResults(workorders);
                } catch(e) {}
            }
            
            document.getElementById('search-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchOrders();
            });
            
            syncFromGist();
            
            setInterval(function() {
                if (currentTab === 'order') {
                    syncFromGist(true);
                }
            }, 3 * 60 * 1000);
        });
        
        async function syncFromGist(silent) {
            if (!silent) showSyncStatus('正在加载数据...');
            
            const gistId = FIXED_GIST_ID;
            
            try {
                const res = await fetch('https://api.github.com/gists/' + gistId, { 
                    cache: 'no-store',
                    signal: AbortSignal.timeout(15000)
                });
                if (!res.ok) throw new Error('网络请求失败');
                
                const data = await res.json();
                const content = data.files['workorders.json']?.content;
                
                if (content) {
                    const newData = JSON.parse(content);
                    workorders = newData;
                    localStorage.setItem('workorders_query', JSON.stringify(workorders));
                    renderResults(workorders);
                    if (!silent) showSyncStatus('数据已更新: ' + new Date().toLocaleTimeString() + ' (' + workorders.length + '条工单)');
                } else {
                    throw new Error('未找到工单数据');
                }
            } catch(err) {
                console.log('同步失败:', err.message);
                if (!silent) {
                    if (workorders.length > 0) {
                        showSyncStatus('使用本地缓存，同步失败: ' + err.message);
                    } else {
                        showSyncStatus('加载失败，请检查网络');
                    }
                }
            }
        }
        
        function searchOrders() {
            const keyword = document.getElementById('search-input').value.trim();
            if (!keyword) {
                alert('请输入网点名称');
                return;
            }
            
            const kw = keyword.toLowerCase();
            const filtered = workorders.filter(o => {
                const dept = (o.dept || '').toLowerCase();
                return dept.includes(kw);
            });
            
            if (filtered.length === 0) {
                document.getElementById('results').innerHTML = '<div class="empty-state" style="background:rgba(255,255,255,0.1);border-radius:12px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M11 8v6M8 11h6"/></svg><p>未找到"' + keyword + '"相关工单</p><p style="font-size:12px;opacity:0.7">请检查网点名称是否正确</p></div>';
                return;
            }
            
            renderResults(filtered);
        }
        
        function renderResults(orders) {
            if (!orders || orders.length === 0) {
                document.getElementById('results').innerHTML = '<div class="empty-state" style="background:rgba(255,255,255,0.1);border-radius:12px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>暂无工单数据</p><p style="font-size:12px;opacity:0.7">请在管理系统中创建工单</p></div>';
                return;
            }
            
            orders.sort((a, b) => new Date(b.create_time) - new Date(a.create_time));
            
            let html = '';
            orders.forEach(order => {
                const date = new Date(order.create_time).toLocaleDateString('zh-CN');
                const desc = order.description || order.desc || '暂无描述';
                const status = order.status || '响应中';
                const vendor = order.vendor || '其他';
                const contactInfo = vendorContacts[vendor] || { contact: '', phone: '' };
                
                html += '<div class="result-card"><div class="row-group dept-row"><span class="row-label">网点名称</span><span class="row-value">' + (order.dept || '-') + '</span></div><div class="row-group"><span class="row-label">工单号</span><span class="row-value">' + order.id + '</span><span class="row-label" style="margin-left:20px">报修日期</span><span class="row-value">' + date + '</span></div><div class="row-group"><span class="row-label">运维商</span><span class="row-value">' + vendor + '</span><span class="row-label" style="margin-left:20px">状态</span><span class="row-value"><span class="status-badge status-' + status + '">' + status + '</span></span></div><div class="row-group"><span class="row-label">维修人员</span><span class="row-value">' + contactInfo.contact + '</span>' + (contactInfo.phone ? '<a href="tel:' + contactInfo.phone + '" class="row-value" style="color:#1976d2;text-decoration:none;margin-left:10px">' + contactInfo.phone + '</a>' : '') + '</div><div class="row-group desc-row"><span class="row-label">故障描述</span><span class="row-value">' + desc + '</span></div>' + (order.remark ? '<div class="row-group" style="background:#fff9c4;border-radius:8px;margin-top:8px"><span class="row-label">备　注</span><span class="row-value">' + order.remark + '</span></div>' : '') + '</div>';
            });
            
            document.getElementById('results').innerHTML = html;
        }

            {设备类型: '叫号机/宣传屏', 设备品牌: '/', 设备维护商: '桂林宇峰电子科技有限公司', 维护负责人: '唐孝纯', 联系方式: '18178357885'},
            {设备类型: '征信查询机', 设备品牌: '/', 设备维护商: '北京信立合创信息技术有限公司', 维护负责人: '谭因金', 联系方式: '13878372640'},
            {设备类型: '移动营销/底座/GPS', 设备品牌: '联想/华为/至高/信雅达', 设备维护商: '业务问题请在企业微信群反馈，设备故障请在分行后勤维修群报修', 维护负责人: '/', 联系方式: '/'},
        ];

        function searchDevice() {
            const input = document.getElementById('device-search-input').value.trim();
            const div = document.getElementById('device-result');
            document.getElementById('device-suggestions').style.display = 'none';
            if (!input) { div.innerHTML = '<div class="device-no-result">请输入网点名称</div>'; return; }
            let matchedCode = null;
            let matchedName = null;
            if (orgMap[input]) { matchedName = input; matchedCode = orgMap[input]; }
            else {
                for (let name in orgMap) {
                    if (name.includes(input) || input.includes(name)) { matchedName = name; matchedCode = orgMap[name]; break; }
                }
            }
            if (!matchedCode) { div.innerHTML = '<div class="device-no-result">未找到匹配结果，请检查网点名称是否正确</div>'; return; }
            const arr = deviceData[matchedCode];
            
            // 合并专属设备和通用设备
            let allDevices = [];
            
            // 添加专属设备（带专属备注）
            if (arr && arr.length > 0) {
                arr.forEach(i => {
                    allDevices.push({...i, 设备分类: '专属设备', 备注: '桂银安保APP报修'});
                });
            }
            
            // 添加通用设备（带通用备注）
            commonDevices.forEach(i => {
                allDevices.push({...i, 设备分类: '通用设备', 备注: '分行后勤维修群报修'});
            });
            
            if (allDevices.length === 0) {
                div.innerHTML = '<div class="device-no-result">该网点暂无设备数据</div>';
                return;
            }
            
            // 统一表格，连续序号
            let h = '<div class="device-org-header"><h2>' + matchedName + '</h2></div>';
            h += '<table class="device-table"><thead><tr><th>序号</th><th>类型</th><th>品牌</th><th>维护商</th><th>负责人</th><th>电话</th><th>备注</th></tr></thead><tbody>';
            
            let serial = 1;
            // 专属设备在前
            if (arr && arr.length > 0) {
                arr.forEach((i, idx) => { 
                    h += '<tr><td>' + serial + '</td><td>' + i.设备类型 + '</td><td>' + i.设备品牌 + '</td><td>' + i.设备维护商 + '</td><td>' + i.维护负责人 + '</td><td>' + i.联系方式 + '</td><td style="color:#e65100;font-weight:bold">桂银安保APP报修</td></tr>'; 
                    serial++;
                });
            }
            
            // 通用设备在后（征信查询机只显示在指定网点）
            commonDevices.forEach((i, idx) => { 
                // 跳过不在指定网点列表中的征信查询机
                if (i.设备类型 === '征信查询机' && !creditMachineBranches.includes(matchedName)) {
                    return;
                }
                h += '<tr><td>' + serial + '</td><td>' + i.设备类型 + '</td><td>' + i.设备品牌 + '</td><td>' + i.设备维护商 + '</td><td>' + i.维护负责人 + '</td><td>' + i.联系方式 + '</td><td style="color:#1976d2;font-weight:bold">分行后勤维修群报修</td></tr>'; 
                serial++;
            });
            
            h += '</tbody></table>';
            
            div.innerHTML = h;
        }
    </script>
