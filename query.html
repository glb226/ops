<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工单进度查询</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; color: #fff; margin-bottom: 25px; }
        .header h1 { font-size: 24px; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .header p { font-size: 14px; opacity: 0.9; margin: 0; }
        .search-card { background: #fff; border-radius: 16px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); margin-bottom: 20px; }
        .search-input { border: 2px solid #e9ecef; border-radius: 12px; padding: 15px; font-size: 16px; transition: all 0.3s; }
        .search-input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); outline: none; }
        .search-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 12px; padding: 15px 30px; color: #fff; font-size: 16px; font-weight: 600; width: 100%; margin-top: 15px; }
        .search-btn:hover { opacity: 0.9; color: #fff; }
        .result-card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); margin-bottom: 15px; }
        .order-id { font-size: 13px; color: #6c757d; margin-bottom: 10px; }
        .order-id strong { color: #495057; }
        .order-title { font-size: 16px; font-weight: 600; color: #212529; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .order-meta { font-size: 14px; color: #6c757d; margin-bottom: 12px; }
        .order-meta span { margin-right: 15px; }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
        .status-响应中 { background: #e7f1ff; color: #0d6efd; }
        .status-审批中 { background: #f3e8ff; color: #6f42c1; }
        .status-已完成 { background: #d4edda; color: #198754; }
        .vendor-info { background: #f8f9fa; border-radius: 10px; padding: 12px 15px; margin-top: 15px; }
        .vendor-info h6 { font-size: 13px; color: #6c757d; margin-bottom: 8px; }
        .vendor-info p { font-size: 14px; margin: 0; color: #212529; }
        .vendor-info .phone { color: #0d6efd; font-weight: 600; text-decoration: none; }
        .vendor-info .phone:hover { text-decoration: underline; }
        .empty-state { text-align: center; padding: 40px 20px; color: #6c757d; }
        .empty-state svg { width: 80px; height: 80px; margin-bottom: 15px; opacity: 0.5; }
        .loading { text-align: center; padding: 40px; color: #6c757d; }
        .tips { text-align: center; color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 20px; }
        @media (max-width: 576px) {
            .container { padding: 15px; }
            .search-card, .result-card { padding: 18px; border-radius: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 工单进度查询</h1>
            <p>输入网点名称，快速查询维修进度</p>
        </div>
        
        <div class="search-card">
            <input type="text" class="form-control search-input" id="search-input" placeholder="请输入网点名称..." autocomplete="off">
            <button class="btn search-btn" onclick="searchOrders()">查询</button>
        </div>
        
        <div id="results"></div>
        <div class="tips">输入关键词即可查询，如"支行"、"分行"、"网点"</div>
    </div>

    <script>
        const GIST_ID_KEY = 'GIST_ID_VAL';
        let workorders = [];
        let vendors = [];
        
        // 运维商联系方式
        const vendorContacts = {
            '广东奔腾达电子有限公司': { contact: '周洪商/韩东', phone: '18176252256' },
            '广州南天电脑系统有限公司': { contact: '梁太鑫', phone: '13877130518' },
            '广西百鼎科技有限责任公司': { contact: '莫德文', phone: '18278387986' },
            '广西佳仕运网络科技有限公司': { contact: '陈剑峰', phone: '13977300180' },
            '广西南宁市源申隆贸易有限公司': { contact: '陈国文', phone: '19077164249' },
            '广西三弦建设工程有限公司': { contact: '曾海龙', phone: '13407718924' },
            '桂林宇峰电子科技有限公司': { contact: '唐孝红', phone: '18178357885' },
            '北京信立合创信息技术有限公司': { contact: '谭因金', phone: '13878372640' },
            '其他': { contact: '', phone: '' }
        };
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 尝试从localStorage加载
            const saved = localStorage.getItem('workorders_query');
            if (saved) {
                try {
                    workorders = JSON.parse(saved);
                    renderResults(workorders);
                } catch(e) {
                    syncFromGist();
                }
            } else {
                syncFromGist();
            }
            
            // 回车搜索
            document.getElementById('search-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchOrders();
            });
            
            // 10分钟自动同步
            setInterval(function() {
                syncFromGist();
                console.log('自动同步完成: ' + new Date().toLocaleString());
            }, 10 * 60 * 1000);
        });
        
        // 从Gist同步数据
        async function syncFromGist() {
            const gistId = localStorage.getItem(GIST_ID_KEY);
            if (!gistId) {
                document.getElementById('results').innerHTML = `
                    <div class="empty-state">
<p>请在管理系统中配置 Gist ID 并同步数据</p>
                    </div>
                `;
                return;
            }
            
            document.getElementById('results').innerHTML = `
                <div class="loading">
                    <p>正在加载数据...</p>
                </div>
            `;
            
            try {
                const res = await fetch(`https://api.github.com/gists/${gistId}`);
                if (!res.ok) throw new Error('网络请求失败');
                
                const data = await res.json();
                const content = data.files['workorders.json']?.content;
                
                if (content) {
                    workorders = JSON.parse(content);
                    localStorage.setItem('workorders_query', JSON.stringify(workorders));
                    renderResults(workorders);
                } else {
                    throw new Error('未找到工单数据');
                }
            } catch(err) {
                document.getElementById('results').innerHTML = `
                    <div class="empty-state">
                        <p>加载失败，请稍后重试</p>
                        <p style="font-size:12px">${err.message}</p>
                    </div>
                `;
            }
        }
        
        // 搜索工单
        function searchOrders() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            if (!keyword) {
                alert('请输入网点名称');
                return;
            }
            
            const filtered = workorders.filter(o => {
                const dept = (o.dept || '').toLowerCase();
                return dept.includes(keyword);
            });
            
            if (filtered.length === 0) {
                document.getElementById('results').innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                            <path d="M11 8v6M8 11h6"/>
                        </svg>
                        <p>未找到相关工单</p>
                        <p style="font-size:12px">请检查网点名称是否正确</p>
                    </div>
                `;
                return;
            }
            
            renderResults(filtered);
        }
        
        // 渲染结果
        function renderResults(orders) {
            // 按时间倒序排列
            orders.sort((a, b) => new Date(b.create_time) - new Date(a.create_time));
            
            let html = '';
            orders.forEach(order => {
                const date = new Date(order.create_time).toLocaleDateString('zh-CN');
                const desc = order.description || order.desc || '暂无描述';
                const status = order.status || '响应中';
                const vendor = order.vendor || '其他';
                const remark = order.remark || '';
                const contactInfo = vendorContacts[vendor] || { contact: '', phone: '' };
                
                html += `
                    <div class="result-card">
                        <div class="order-id">工单号：<strong>${order.id}</strong></div>
                        <div class="order-title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6c757d" stroke-width="2">
                                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                            </svg>
                            ${desc}
                        </div>
                        <div class="order-meta">
                            <span>📅 ${date}</span>
                            <span>🏢 ${order.dept}</span>
                            <span>🏭 ${vendor}</span>
                        </div>
                        ${remark ? `<div class="order-remark" style="font-size:14px;color:#6c757d;margin-bottom:10px;">📝 备注：${remark}</div>` : ''}
                        <div>
                            <span class="status-badge status-${status}">${status}</span>
                        </div>
                        ${contactInfo.phone ? `
                            <div class="vendor-info">
                                <h6>👤 维修人员</h6>
                                <p>${contactInfo.contact}</p>
                                <a href="tel:${contactInfo.phone}" class="phone">📞 ${contactInfo.phone}</a>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
