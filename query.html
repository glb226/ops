<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工单进度查询</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #1976d2 0%, #42a5f5 50%, #64b5f6 100%); 
            min-height: 100vh; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        .container { max-width: 100%; margin: 0 auto; padding: 15px; }
        .header { text-align: center; color: #fff; margin-bottom: 20px; padding-top: 10px; }
        .header h1 { font-size: 22px; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .header p { font-size: 13px; opacity: 0.9; margin: 0; }
        .search-card { 
            background: #fff; 
            border-radius: 16px; 
            padding: 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.12); 
            margin-bottom: 15px; 
        }
        .search-input { 
            border: 2px solid #e3f2fd; 
            border-radius: 10px; 
            padding: 14px; 
            font-size: 16px; 
            transition: all 0.3s; 
        }
        .search-input:focus { 
            border-color: #1976d2; 
            box-shadow: 0 0 0 3px rgba(25,118,210,0.15); 
            outline: none; 
        }
        .search-btn { 
            background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%); 
            border: none; 
            border-radius: 10px; 
            padding: 14px; 
            color: #fff; 
            font-size: 16px; 
            font-weight: 600; 
            width: 100%; 
            margin-top: 12px; 
        }
        .search-btn:hover { 
            background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
            color: #fff; 
        }
        .result-card { 
            background: #fff; 
            border-radius: 16px; 
            padding: 18px; 
            box-shadow: 0 4px 16px rgba(0,0,0,0.08); 
            margin-bottom: 12px; 
            border-left: 4px solid #1976d2;
        }
        .order-id { 
            font-size: 12px; 
            color: #90caf9; 
            margin-bottom: 8px; 
            font-weight: 500;
        }
        .order-id strong { 
            color: #1565c0; 
            font-size: 13px;
        }
        .order-title { 
            font-size: 15px; 
            font-weight: 600; 
            color: #212529; 
            margin-bottom: 10px; 
            line-height: 1.5;
            background: #f8f9fa;
            padding: 10px 12px;
            border-radius: 8px;
        }
        .order-info { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 8px;
            margin-bottom: 12px;
        }
        .order-info-item {
            font-size: 13px;
            color: #666;
        }
        .order-info-item .label {
            color: #999;
            font-size: 11px;
        }
        .status-badge { 
            display: inline-block; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 600; 
        }
        .status-响应中 { background: #e3f2fd; color: #1976d2; }
        .status-审批中 { background: #f3e8ff; color: #6f42c1; }
        .status-已完成 { background: #e8f5e9; color: #2e7d32; }
        .vendor-info { 
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); 
            border-radius: 10px; 
            padding: 12px 14px; 
            margin-top: 12px; 
        }
        .vendor-info h6 { 
            font-size: 12px; 
            color: #666; 
            margin-bottom: 6px; 
            font-weight: 500;
        }
        .vendor-info p { 
            font-size: 14px; 
            margin: 0 0 4px 0; 
            color: #212529; 
            font-weight: 500;
        }
        .vendor-info .phone { 
            color: #1976d2; 
            font-weight: 600; 
            text-decoration: none; 
            font-size: 14px;
        }
        .empty-state { 
            text-align: center; 
            padding: 50px 20px; 
            color: #fff; 
        }
        .empty-state svg { 
            width: 70px; 
            height: 70px; 
            margin-bottom: 15px; 
            opacity: 0.7; 
        }
        .empty-state p {
            margin: 5px 0;
            font-size: 14px;
        }
        .loading { 
            text-align: center; 
            padding: 50px 20px; 
            color: #fff; 
        }
        .tips { 
            text-align: center; 
            color: rgba(255,255,255,0.85); 
            font-size: 12px; 
            margin-top: 15px; 
        }
        .sync-status {
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            margin-top: 8px;
        }
        @media (max-width: 576px) {
            .container { padding: 12px; }
            .search-card, .result-card { padding: 15px; border-radius: 12px; }
            .header h1 { font-size: 20px; }
            .order-info { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 工单进度查询</h1>
            <p>输入网点名称，快速查询维修进度</p>
        </div>
        
        <div class="search-card">
            <input type="text" class="form-control search-input" id="search-input" placeholder="请输入网点名称..." autocomplete="off">
            <button class="btn search-btn" onclick="searchOrders()">查 询</button>
        </div>
        
        <div id="results"></div>
        <div class="tips">输入关键词即可查询，如"支行"、"分行"、"网点"</div>
        <div class="sync-status" id="sync-status"></div>
    </div>

    <script>
        const GIST_ID = '9ae11536cf7304baed38841a47c39385';
        let workorders = [];
        
        // 运维商联系方式
        const vendorContacts = {
            '广东奔腾达电子有限公司': { contact: '周洪商/韩东', phone: '18176252256' },
            '广州南天电脑系统有限公司': { contact: '梁太鑫', phone: '13877130518' },
            '广西百鼎科技有限责任公司': { contact: '莫德文', phone: '18278387986' },
            '广西佳仕运网络科技有限公司': { contact: '陈剑峰', phone: '13977300180' },
            '广西南宁市源申隆贸易有限公司': { contact: '陈国文', phone: '19077164249' },
            '广西三弦建设工程有限公司': { contact: '曾海龙', phone: '13407718924' },
            '桂林宇峰电子科技有限公司': { contact: '唐孝红', phone: '18178357885' },
            '北京信立合创信息技术有限公司': { contact: '谭因金', phone: '13878372640' },
            '其他': { contact: '', phone: '' }
        };
        
        // 显示同步状态
        function showSyncStatus(msg) {
            document.getElementById('sync-status').textContent = msg;
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 优先从本地缓存加载
            const saved = localStorage.getItem('workorders_query');
            if (saved) {
                try {
                    workorders = JSON.parse(saved);
                    renderResults(workorders);
                } catch(e) {}
            }
            
            // 回车搜索
            document.getElementById('search-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchOrders();
            });
            
            // 立即同步云端数据
            syncFromGist();
            
            // 每3分钟静默同步一次
            setInterval(function() {
                syncFromGist(true);
            }, 3 * 60 * 1000);
        });
        
        // 从Gist同步数据
        async function syncFromGist(silent) {
            if (!silent) showSyncStatus('正在加载数据...');
            
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, { 
                    cache: 'no-store',
                    signal: AbortSignal.timeout(15000)
                });
                if (!res.ok) throw new Error('网络请求失败');
                
                const data = await res.json();
                const content = data.files['workorders.json']?.content;
                
                if (content) {
                    const newData = JSON.parse(content);
                    workorders = newData;
                    localStorage.setItem('workorders_query', JSON.stringify(workorders));
                    renderResults(workorders);
                    if (!silent) showSyncStatus('数据已更新: ' + new Date().toLocaleTimeString());
                } else {
                    throw new Error('未找到工单数据');
                }
            } catch(err) {
                console.log('同步失败:', err.message);
                if (!silent) {
                    if (workorders.length > 0) {
                        showSyncStatus('使用本地缓存，同步失败: ' + err.message);
                    } else {
                        showSyncStatus('加载失败，请检查网络');
                    }
                }
            }
        }
        
        // 搜索工单
        function searchOrders() {
            const keyword = document.getElementById('search-input').value.trim();
            if (!keyword) {
                alert('请输入网点名称');
                return;
            }
            
            const kw = keyword.toLowerCase();
            const filtered = workorders.filter(o => {
                const dept = (o.dept || '').toLowerCase();
                return dept.includes(kw);
            });
            
            if (filtered.length === 0) {
                document.getElementById('results').innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                            <path d="M11 8v6M8 11h6"/>
                        </svg>
                        <p>未找到"${keyword}"相关工单</p>
                        <p style="font-size:12px;opacity:0.7">请检查网点名称是否正确</p>
                    </div>
                `;
                return;
            }
            
            renderResults(filtered);
        }
        
        // 渲染结果
        function renderResults(orders) {
            if (!orders || orders.length === 0) {
                document.getElementById('results').innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                        </svg>
                        <p>暂无工单数据</p>
                        <p style="font-size:12px;opacity:0.7">请在管理系统中创建工单</p>
                    </div>
                `;
                return;
            }
            
            // 按时间倒序排列
            orders.sort((a, b) => new Date(b.create_time) - new Date(a.create_time));
            
            let html = '';
            orders.forEach(order => {
                const date = new Date(order.create_time).toLocaleDateString('zh-CN');
                const desc = order.description || order.desc || '暂无描述';
                const status = order.status || '响应中';
                const vendor = order.vendor || '其他';
                const remark = order.remark || '';
                const contactInfo = vendorContacts[vendor] || { contact: '', phone: '' };
                
                html += `
                    <div class="result-card">
                        <div class="order-id">工单号：<strong>${order.id}</strong></div>
                        <div class="order-title">${desc}</div>
                        <div class="order-info">
                            <div class="order-info-item">
                                <div class="label">报修日期</div>
                                <div>${date}</div>
                            </div>
                            <div class="order-info-item">
                                <div class="label">运维商</div>
                                <div style="font-weight:500">${vendor}</div>
                            </div>
                            <div class="order-info-item">
                                <div class="label">网点</div>
                                <div>${order.dept || '-'}</div>
                            </div>
                            <div class="order-info-item">
                                <div class="label">状态</div>
                                <span class="status-badge status-${status}">${status}</span>
                            </div>
                        </div>
                        ${remark ? `<div style="font-size:13px;color:#666;margin-bottom:10px;padding:8px;background:#fff9c4;border-radius:6px;">📝 ${remark}</div>` : ''}
                        ${contactInfo.phone ? `
                            <div class="vendor-info">
                                <h6>👤 维修人员</h6>
                                <p>${contactInfo.contact}</p>
                                <a href="tel:${contactInfo.phone}" class="phone">📞 ${contactInfo.phone}</a>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
