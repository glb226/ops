<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网点运维管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#e3f2fd;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px}
        .sidebar{background:#1976d2;color:#fff;position:fixed;width:180px;height:100%;left:0;top:0;z-index:100}
        .sidebar .logo{background:#1565c0;padding:15px;text-align:center;font-size:15px;font-weight:bold}
        .sidebar a{color:#fff;padding:12px 15px;display:block;text-decoration:none;border-left:3px solid transparent;cursor:pointer}
        .sidebar a:hover,.sidebar a.active{background:#1e88e5;border-left-color:#fff}
        .main-content{margin-left:180px;padding:20px;min-height:100vh}
        .page-title{font-size:18px;font-weight:bold;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #1976d2}
        .status-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500}
        .status-响应中{color:#007bff;background:#e7f1ff}
        .status-审批中{color:#6f42c1;background:#f3e8ff}
        .status-已完成{color:#28a745;background:#d4edda}
        .card{border:none;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-bottom:15px}
        .card-header{background:#fff;border-bottom:1px solid #eee;padding:12px 15px;font-weight:600}
        .btn-primary{background:#1976d2;border:none;color:#fff}
        .btn-primary:hover{background:#1565c0}
        table{font-size:13px;width:100%}
        th{background:#f8f9fa;padding:10px;text-align:left;font-weight:600;color:#666;font-size:12px}
        td{padding:10px;border-bottom:1px solid #eee}
        .chart-container{position:relative;height:200px}
        .status-select{width:80px;padding:2px 4px;font-size:11px;border-radius:4px;border:1px solid #ddd;background:#fff}
        .clickable-num{cursor:pointer;color:#007bff;font-weight:bold}
        .clickable-num:hover{text-decoration:underline}
        @media(max-width:768px){ .sidebar{display:none} .main-content{margin:0;padding:15px} }
    </style>
</head>
<body>
<div id="main-system">
    <div class="sidebar d-none d-md-block">
        <div class="logo d-flex align-items-center justify-content-center gap-2">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            <span>网点运维</span>
        </div>
        <a onclick="showPage('generate')" id="nav-generate" class="active d-flex align-items-center gap-2"><span>工单生成</span></a>
        <a onclick="showPage('workorders')" id="nav-workorders" class="d-flex align-items-center gap-2"><span>工单管理</span></a>
        <a onclick="showPage('dashboard')" id="nav-dashboard" class="d-flex align-items-center gap-2"><span>数据看板</span></a>
        <a onclick="showPage('vendors')" id="nav-vendors" class="d-flex align-items-center gap-2"><span>运维商</span></a>
        <a onclick="showPage('warehouse')" id="nav-warehouse" class="d-flex align-items-center gap-2"><span>仓储管理</span></a>
        <hr style="opacity:0.2">
        <a onclick="showPage('settings')" id="nav-settings" class="d-flex align-items-center gap-2" style="background:#0d47a1"><span>⚙️ 系统设置</span></a>
    </div>
    <div class="main-content">
        <!-- 第1页：工单生成 (原样) -->
        <div id="page-generate">
            <div class="page-title">工单生成</div>
            <div class="card p-3">
                <textarea class="form-control mb-2" id="ai-input" rows="5" placeholder="粘贴工单信息..."></textarea>
                <button class="btn btn-primary btn-sm" onclick="analyzeWorkorder()">AI智能分析</button>
            </div>
            <div class="card p-3" id="analysis-result" style="display:none;">
                <div class="row g-2">
                    <div class="col-6"><label class="small text-muted">机构</label><input class="form-control" id="edit-dept"></div>
                    <div class="col-6"><label class="small text-muted">设备</label><input class="form-control" id="edit-device"></div>
                </div>
                <button class="btn btn-success btn-sm mt-3" onclick="confirmCreate()">确认生成工单</button>
            </div>
        </div>

        <!-- 第2页：工单管理 (新增同步功能) -->
        <div id="page-workorders" style="display:none;">
            <div class="page-title d-flex justify-content-between align-items-center">
                <span>工单管理</span>
                <button class="btn btn-info btn-sm text-white" onclick="syncFromGist()">🔄 从云端同步数据</button>
            </div>
            <div class="card overflow-auto">
                <table class="table table-sm table-hover" id="workorder-table">
                    <thead><tr><th>工单号</th><th>机构</th><th>描述</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- 仓储管理 & 看板 (原样预留入口) -->
        <div id="page-dashboard" style="display:none;"><div class="page-title">数据看板</div><div class="alert alert-light">原有看板功能已保留，同步后即可查看统计。</div></div>
        <div id="page-vendors" style="display:none;"><div class="page-title">运维商列表</div><div class="alert alert-light">原有映射表已保留。</div></div>
        <div id="page-warehouse" style="display:none;"><div class="page-title">仓储管理</div><div class="alert alert-light">原有仓储及费用统计模块均已保留。</div></div>

        <!-- 第3页：设置 (新增) -->
        <div id="page-settings" style="display:none;">
            <div class="page-title">系统设置 (Gist 配置)</div>
            <div class="card p-4">
                <label class="small fw-bold mb-2">GitHub Gist ID</label>
                <input type="text" class="form-control mb-3" id="gist-id-input" placeholder="输入 32 位 ID">
                <button class="btn btn-primary btn-sm" onclick="saveGistSetting()">保存配置</button>
                <div class="form-text mt-2">填入 <b>6ae766bcc9cb000bbda0006debc06ef3</b> 连通贾克斯信箱。</div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let workorders = [];
const STORAGE_KEY = 'workorders_local2';
const GIST_SET_KEY = 'GIST_ID_FINAL_VAL';

function init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { workorders = JSON.parse(saved); }
    renderWorkorders();
}

function showPage(p) {
    ['generate', 'workorders', 'dashboard', 'vendors', 'warehouse', 'settings'].forEach(id => {
        const div = document.getElementById('page-' + id);
        if(div) div.style.display = 'none';
        const nav = document.getElementById('nav-' + id);
        if(nav) nav.classList.remove('active');
    });
    document.getElementById('page-' + p).style.display = 'block';
    const activeNav = document.getElementById('nav-' + p);
    if(activeNav) activeNav.classList.add('active');
    
    if (p === 'workorders') renderWorkorders();
    if (p === 'settings') document.getElementById('gist-id-input').value = localStorage.getItem(GIST_SET_KEY) || '';
}

function saveGistSetting() {
    const val = document.getElementById('gist-id-input').value.trim();
    localStorage.setItem(GIST_SET_KEY, val);
    alert('配置已保存！请回“工单管理”同步。');
    showPage('workorders');
}

async function syncFromGist() {
    const gistId = localStorage.getItem(GIST_SET_KEY);
    if(!gistId) { alert('请先去“系统设置”配置 Gist ID'); return; }
    const btn = document.querySelector('button[onclick="syncFromGist()"]');
    btn.disabled = true; btn.innerText = '📡 同步中...';
    try {
        const res = await fetch(`https://api.github.com/gists/${gistId}`);
        const data = await res.json();
        const content = JSON.parse(data.files['workorders.json'].content);
        content.forEach(n => { if(!workorders.some(o => o.id === n.id)) workorders.unshift(n); });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(workorders));
        renderWorkorders();
        alert('🎉 同步完毕，加载工单成功！');
    } catch(err) { alert('同步失败：' + err.message); }
    finally { btn.disabled = false; btn.innerText = '🔄 从云端同步数据'; }
}

function renderWorkorders() {
    const tbody = document.querySelector('#workorder-table tbody');
    tbody.innerHTML = workorders.map(o => `<tr><td class="small">${o.id}</td><td>${o.dept||''}</td><td>${(o.description||'').substring(0,18)}...</td><td><span class="badge bg-primary">${o.status}</span></td><td class="small">${new Date(o.create_time).toLocaleDateString()}</td><td><button class="btn btn-sm btn-link text-danger p-0" onclick="deleteWorkorder('${o.id}')">删除</button></td></tr>`).join('');
}

function deleteWorkorder(id) {
    if(confirm('删除?')) { workorders = workorders.filter(o => o.id !== id); localStorage.setItem(STORAGE_KEY, JSON.stringify(workorders)); renderWorkorders(); }
}

function analyzeWorkorder() {
    const i = document.getElementById('ai-input').value;
    if(!i) return;
    document.getElementById('edit-dept').value = i.match(/[机构部门][：:]\s*(.+)/)?.[1] || '待确认';
    document.getElementById('analysis-result').style.display = 'block';
}

function confirmCreate() { alert('请点击同步按钮获取。'); }

init();
</script>
</body>
</html>
