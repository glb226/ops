<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网点运维管理 - nexu 增强版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#e3f2fd;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px}
        .sidebar{background:#1976d2;color:#fff;position:fixed;width:180px;height:100%;left:0;top:0;z-index:100}
        .sidebar .logo{background:#1565c0;padding:15px;text-align:center;font-size:15px;font-weight:bold}
        .sidebar a{color:#fff;padding:12px 15px;display:block;text-decoration:none;border-left:3px solid transparent;cursor:pointer}
        .sidebar a:hover,.sidebar a.active{background:#1e88e5;border-left-color:#fff}
        .main-content{margin-left:180px;padding:20px;min-height:100vh}
        .page-title{font-size:18px;font-weight:bold;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #1976d2}
        .card{border:none;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-bottom:15px}
        .btn-primary{background:#1976d2;border:none}
        .status-badge{padding:3px 8px;border-radius:4px;font-size:11px}
        .status-响应中{color:#007bff;background:#e7f1ff}
        .status-已完成{color:#28a745;background:#d4edda}
        @media(max-width:768px){.sidebar{display:none}.main-content{margin:0}}
    </style>
</head>
<body>
<div id="main-system">
    <div class="sidebar d-none d-md-block">
        <div class="logo">网点运维 🤖</div>
        <a onclick="showPage('generate')" id="nav-generate" class="active">工单生成</a>
        <a onclick="showPage('workorders')" id="nav-workorders">工单管理</a>
        <a onclick="showPage('dashboard')" id="nav-dashboard">数据看板</a>
        <a onclick="showPage('vendors')" id="nav-vendors">运维商</a>
        <a onclick="showPage('settings')" id="nav-settings" style="background:#0d47a1">⚙️ 系统设置</a>
    </div>
    <div class="main-content">
        <!-- 工单生成 -->
        <div id="page-generate">
            <div class="page-title">工单生成</div>
            <div class="card p-3">
                <textarea class="form-control mb-2" id="ai-input" rows="5" placeholder="粘贴报修信息..."></textarea>
                <button class="btn btn-primary btn-sm" onclick="analyzeWorkorder()">AI 智能分析</button>
            </div>
            <div id="analysis-result" style="display:none;" class="card p-3">
                <div class="row g-2">
                    <div class="col-6"><label class="small text-muted">机构</label><input class="form-control form-control-sm" id="edit-dept"></div>
                    <div class="col-6"><label class="small text-muted">报修人</label><input class="form-control form-control-sm" id="edit-person"></div>
                    <div class="col-12"><label class="small text-muted">故障描述</label><input class="form-control form-control-sm" id="edit-desc"></div>
                </div>
                <button class="btn btn-success btn-sm mt-3" onclick="confirmCreate()">确认并存入云端</button>
            </div>
        </div>

        <!-- 工单管理 -->
        <div id="page-workorders" style="display:none;">
            <div class="page-title d-flex justify-content-between">
                <span>工单管理</span>
                <button class="btn btn-info btn-sm text-white" onclick="syncFromGist()">🔄 从云端同步数据</button>
            </div>
            <div class="card">
                <table class="table table-hover mb-0">
                    <thead><tr><th>工单号</th><th>机构</th><th>描述</th><th>状态</th><th>时间</th></tr></thead>
                    <tbody id="workorder-list"></tbody>
                </table>
            </div>
        </div>

        <!-- 系统设置 -->
        <div id="page-settings" style="display:none;">
            <div class="page-title">系统设置 (Cloud Sync)</div>
            <div class="card p-3">
                <div class="mb-3">
                    <label class="form-label">GitHub Gist ID</label>
                    <input type="text" class="form-control" id="gist-id-input" placeholder="输入 32 位 Gist ID">
                    <div class="form-text">当前 ID: <span id="current-gist-display" class="fw-bold">未设置</span></div>
                </div>
                <button class="btn btn-primary" onclick="saveSettings()">保存配置</button>
                <hr>
                <div class="alert alert-info small">
                    填入 <b>6ae766bcc9cb000bbda0006debc06ef3</b> 即可与贾克斯的信箱连通。
                </div>
            </div>
        </div>

        <!-- 数据看板 & 运维商 (预留占位) -->
        <div id="page-dashboard" style="display:none;"><div class="page-title">数据看板</div><p>数据加载中...</p></div>
        <div id="page-vendors" style="display:none;"><div class="page-title">运维商管理</div><p>功能完善中...</p></div>
    </div>
</div>

<script>
    let workorders = [];
    const GIST_KEY = 'GIST_ID_VAL';
    
    function showPage(pageId) {
        document.querySelectorAll('.main-content > div').forEach(div => div.style.display = 'none');
        document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
        document.getElementById('page-' + pageId).style.display = 'block';
        document.getElementById('nav-' + pageId).classList.add('active');
        if(pageId === 'workorders') renderList();
        if(pageId === 'settings') {
            document.getElementById('gist-id-input').value = localStorage.getItem(GIST_KEY) || '';
            document.getElementById('current-gist-display').innerText = localStorage.getItem(GIST_KEY) || '未设置';
        }
    }

    function saveSettings() {
        const id = document.getElementById('gist-id-input').value.trim();
        if(!id) return alert('请输入 ID');
        localStorage.setItem(GIST_KEY, id);
        alert('配置已保存！请去工单管理点同步。');
        showPage('workorders');
    }

    async function syncFromGist() {
        const id = localStorage.getItem(GIST_KEY);
        if(!id) return alert('请先去系统设置填入 Gist ID');
        const btn = document.querySelector('button[onclick="syncFromGist()"]');
        btn.innerText = '📡 同步中...';
        try {
            const resp = await fetch(`https://api.github.com/gists/${id}`);
            const data = await resp.json();
            const content = JSON.parse(data.files['workorders.json'].content);
            workorders = content;
            renderList();
            alert('同步成功！共加载 ' + workorders.length + ' 条工单。');
        } catch(e) {
            alert('同步失败，请检查 ID 是否正确或网络是否通畅');
        } finally {
            btn.innerText = '🔄 从云端同步数据';
        }
    }

    function renderList() {
        const body = document.getElementById('workorder-list');
        body.innerHTML = workorders.map(o => `
            <tr>
                <td>${o.id || '-'}</td>
                <td>${o.dept || '-'}</td>
                <td title="${o.description}">${(o.description || '').substring(0,15)}...</td>
                <td><span class="status-badge status-${o.status}">${o.status}</span></td>
                <td>${o.create_time ? new Date(o.create_time).toLocaleDateString() : '-'}</td>
            </tr>
        `).join('');
    }

    function analyzeWorkorder() {
        const input = document.getElementById('ai-input').value;
        document.getElementById('edit-dept').value = input.match(/机构[：:]\s*(.+)/)?.[1] || '待识别';
        document.getElementById('edit-person').value = input.match(/报修人[：:]\s*(.+)/)?.[1] || '待识别';
        document.getElementById('edit-desc').value = input.match(/项目[：:]\s*(.+)/)?.[1] || input.substring(0,20);
        document.getElementById('analysis-result').style.display = 'block';
    }

    function confirmCreate() {
        alert('贾克斯暂未获得写入权限，请手动在工单管理中同步。数据已在云端就绪！');
    }
    
    // 初始化显示第一页
    showPage('generate');
</script>
</body>
</html>
