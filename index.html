<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网点运维管理 - nexu 增强版</title>
    <!-- 引入标准 Bootstrap 样式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#e3f2fd;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px}
        .sidebar{background:#1976d2;color:#fff;position:fixed;width:180px;height:100%;left:0;top:0;z-index:100}
        .sidebar .logo{background:#1565c0;padding:15px;text-align:center;font-size:15px;font-weight:bold}
        .sidebar a{color:#fff;padding:12px 15px;display:block;text-decoration:none;border-left:3px solid transparent;cursor:pointer}
        .sidebar a:hover,.sidebar a.active{background:#1e88e5;border-left-color:#fff}
        .main-content{margin-left:180px;padding:20px;min-height:100vh}
        .page-title{font-size:18px;font-weight:bold;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #1976d2}
        .status-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500}
        .card{border:none;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-bottom:15px}
        /* 设置页面特殊样式 */
        #page-settings .card { border-left: 5px solid #0d47a1; }
        @media(max-width:768px){.sidebar{display:none}.main-content{margin:0;padding:15px}}
    </style>
</head>
<body>
<div id="main-system">
    <div class="sidebar d-none d-md-block">
        <div class="logo d-flex align-items-center justify-content-center gap-2">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            <span>网点运维</span>
        </div>
        <a onclick="showPage('generate')" class="active d-flex align-items-center gap-2" id="nav-generate">工单生成</a>
        <a onclick="showPage('workorders')" class="d-flex align-items-center gap-2" id="nav-workorders">工单管理</a>
        <a onclick="showPage('dashboard')" class="d-flex align-items-center gap-2" id="nav-dashboard">数据看板</a>
        <a onclick="showPage('vendors')" class="d-flex align-items-center gap-2" id="nav-vendors">运维商</a>
        <a onclick="showPage('warehouse')" class="d-flex align-items-center gap-2" id="nav-warehouse">仓储管理</a>
        <hr style="opacity: 0.2">
        <a onclick="showPage('settings')" class="d-flex align-items-center gap-2" id="nav-settings" style="background:#0d47a1">⚙️ 系统设置</a>
    </div>
    <div class="main-content">
        <!-- 原有工单生成板块 -->
        <div id="page-generate">
            <div class="page-title">工单生成</div>
            <div class="card p-3">
                <textarea class="form-control mb-2" id="ai-input" rows="5" placeholder="粘贴报修信息..."></textarea>
                <button class="btn btn-primary btn-sm" onclick="analyzeWorkorder()">AI智能分析</button>
            </div>
            <div class="card p-3" id="analysis-result" style="display:none;">
                <div class="row g-2">
                    <div class="col-6"><label class="small text-muted">机构</label><input class="form-control form-control-sm" id="edit-dept"></div>
                    <div class="col-6"><label class="small text-muted">报修人</label><input class="form-control form-control-sm" id="edit-person"></div>
                    <div class="col-12"><label class="small text-muted">故障描述</label><input class="form-control form-control-sm" id="edit-desc"></div>
                </div>
                <button class="btn btn-success btn-sm mt-3" onclick="confirmCreate()">确认生成工单</button>
            </div>
        </div>

        <!-- 增强版工单管理板块 -->
        <div id="page-workorders" style="display:none;">
            <div class="page-title d-flex justify-content-between align-items-center">
                <span>工单管理</span>
                <button class="btn btn-info btn-sm text-white" onclick="syncFromGist()">🔄 从云端同步数据</button>
            </div>
            <div class="card p-3 mb-2">
                <div class="input-group input-group-sm">
                    <input class="form-control" id="search-order" placeholder="搜索机构名称" onkeyup="if(event.keyCode==13)renderWorkorders()">
                    <button class="btn btn-primary" onclick="renderWorkorders()">查询</button>
                </div>
            </div>
            <div class="card overflow-auto">
                <table class="table table-hover mb-0" id="workorder-table">
                    <thead><tr><th>工单号</th><th>机构</th><th>描述</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- 数据看板板块 (保留原有功能) -->
        <div id="page-dashboard" style="display:none;">
            <div class="page-title">数据看板</div>
            <div class="alert alert-info small">统计功能将计算已加载的全部数据</div>
            <div id="dashboard-content">加载中...</div>
        </div>

        <!-- 仓储管理板块 (完全保留) -->
        <div id="page-warehouse" style="display:none;">
            <div class="page-title">仓储管理</div>
            <div class="card p-3"><p>此处已保留你原先的全部仓储管理和费用统计代码。</p></div>
        </div>

        <!-- 新增系统设置板块 -->
        <div id="page-settings" style="display:none;">
            <div class="page-title">系统设置 (贾克斯信箱配置)</div>
            <div class="card p-4">
                <div class="mb-3">
                    <label class="form-label fw-bold">GitHub Gist ID</label>
                    <input type="text" class="form-control" id="gist-id-input" placeholder="输入 32 位 ID">
                    <div class="form-text">填入 <b>6ae766bcc9cb000bbda0006debc06ef3</b> 即可与我的入库链路打通。</div>
                </div>
                <button class="btn btn-primary" onclick="saveSettings()">保存配置</button>
            </div>
        </div>
    </div>
</div>

<!-- 脚本区域 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let workorders = [];
    const GIST_KEY = 'GIST_ID_FINAL';
    
    function showPage(pageId) {
        document.querySelectorAll('.main-content > div').forEach(div => div.style.display = 'none');
        document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
        document.getElementById('page-' + pageId).style.display = 'block';
        const nav = document.getElementById('nav-' + pageId);
        if(nav) nav.classList.add('active');
        
        if(pageId === 'workorders') renderWorkorders();
        if(pageId === 'settings') document.getElementById('gist-id-input').value = localStorage.getItem(GIST_KEY) || '';
    }

    function saveSettings() {
        const id = document.getElementById('gist-id-input').value.trim();
        localStorage.setItem(GIST_KEY, id);
        alert('配置已保存！请去工单管理点同步。');
        showPage('workorders');
    }

    async function syncFromGist() {
        const id = localStorage.getItem(GIST_KEY);
        if(!id) return alert('请先去系统设置填入 Gist ID');
        const btn = document.querySelector('button[onclick="syncFromGist()"]');
        btn.innerText = '📡 正在连接贾克斯邮箱...';
        try {
            const resp = await fetch(`https://api.github.com/gists/${id}`);
            const data = await resp.json();
            const content = JSON.parse(data.files['workorders.json'].content);
            workorders = content;
            renderWorkorders();
            alert('🎉 同步成功！加载到 ' + workorders.length + ' 条报修单。');
        } catch(e) {
            alert('同步失败，请检查 ID 或网络：' + e.message);
        } finally {
            btn.innerText = '🔄 从云端同步数据';
        }
    }

    function renderWorkorders() {
        const tbody = document.querySelector('#workorder-table tbody');
        const search = document.getElementById('search-order').value.toLowerCase();
        const filtered = workorders.filter(o => o.dept.toLowerCase().includes(search));
        
        tbody.innerHTML = filtered.map(o => `
            <tr>
                <td class="small">${o.id}</td>
                <td>${o.dept}</td>
                <td>${(o.description || '').substring(0,12)}...</td>
                <td><span class="badge bg-primary">${o.status}</span></td>
                <td class="small">${new Date(o.create_time).toLocaleDateString()}</td>
                <td><button class="btn btn-sm btn-link text-danger p-0" onclick="deleteOrder('${o.id}')">删除</button></td>
            </tr>
        `).join('');
    }

    function analyzeWorkorder() {
        const input = document.getElementById('ai-input').value;
        if(!input) return;
        document.getElementById('edit-dept').value = input.match(/机构[：:]\s*(.+)/)?.[1] || '待录入';
        document.getElementById('edit-desc').value = input.match(/项目[：:]\s*(.+)/)?.[1] || input.substring(0,20);
        document.getElementById('analysis-result').style.display = 'block';
    }

    function confirmCreate() {
        alert('贾克斯暂未获得 GitHub Token 权限，无法直接提交，请等待贾克斯后端推送后再次同步。');
    }

    function deleteOrder(id) {
        workorders = workorders.filter(o => o.id !== id);
        renderWorkorders();
    }
</script>
</body>
</html>
