<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网点运维管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#e3f2fd;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px}
        .sidebar{background:#1976d2;color:#fff;position:fixed;width:180px;height:100%;left:0;top:0;z-index:100}
        .sidebar .logo{background:#1565c0;padding:15px;text-align:center;font-size:15px;font-weight:bold}
        .sidebar a{color:#fff;padding:12px 15px;display:block;text-decoration:none;border-left:3px solid transparent}
        .sidebar a:hover,.sidebar a.active{background:#1e88e5;border-left-color:#fff}
        .main-content{margin-left:180px;padding:20px;min-height:100vh}
        .login-page{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#1976d2,#42a5f5)}
        .login-box{max-width:360px;padding:30px;background:#fff;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.3);width:90%}
        .login-box h4{text-align:center;margin-bottom:25px;color:#1976d2}
        .page-title{font-size:18px;font-weight:bold;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #1976d2}
        .status-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500}
        .status-响应中{color:#007bff;background:#e7f1ff}
        .status-审批中{color:#6f42c1;background:#f3e8ff}
        .status-已完成{color:#28a745;background:#d4edda}
        .card{border:none;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-bottom:15px}
        .card-header{background:#fff;border-bottom:1px solid #eee;padding:12px 15px;font-weight:600}
        .btn-primary{background:#1976d2;border:none;color:#fff}
        .btn-primary:hover{background:#1565c0}
        table{font-size:13px;width:100%}
        th{background:#f8f9fa;padding:10px;text-align:left;font-weight:600;color:#666;font-size:12px}
        td{padding:10px;border-bottom:1px solid #eee}
        .chart-container{position:relative;height:200px}
        @media(max-width:768px){
            .sidebar{display:none}
            .main-content{margin:0;padding:15px}
            .mobile-nav{position:fixed;bottom:0;left:0;right:0;background:#1976d2;display:flex;height:55px;z-index:100}
            .mobile-nav a{flex:1;text-align:center;color:#fff;padding:15px 0;font-size:11px;text-decoration:none}
            .mobile-nav a.active{border-bottom:3px solid #fff}
            .main-content{padding-bottom:70px}
        }
    </style>
</head>
<body>
<div id="login-page" class="login-page">
    <div class="login-box">
        <h4>网点运维管理</h4>
        <form id="login-form">
            <div class="mb-3"><label class="form-label">用户名</label><input type="text" class="form-control" id="login-username" required></div>
            <div class="mb-3"><label class="form-label">密码</label><input type="password" class="form-control" id="login-password" required></div>
            <button type="submit" class="btn btn-primary w-100 py-2">登录</button>
        </form>
        <p class="text-center mt-3 text-muted small" id="login-hint"></p>
    </div>
</div>

<div id="main-system" style="display:none;">
    <div class="sidebar d-none d-md-block">
        <div class="logo">网点运维管理</div>
        <a href="#" onclick="showPage('generate')" class="active" id="nav-generate">📝 工单生成</a>
        <a href="#" onclick="showPage('workorders')" id="nav-workorders">📂 工单管理</a>
        <a href="#" onclick="showPage('dashboard')" id="nav-dashboard">📊 数据看板</a>
        <a href="#" onclick="showPage('vendors')" id="nav-vendors">👷 运维商</a>
        <a href="#" onclick="showPage('settings')" id="nav-settings">⚙️ 系统设置</a>
        <a href="#" onclick="logout()">退出</a>
    </div>
    <div class="mobile-nav d-md-none">
        <a href="#" onclick="showPage('generate')" id="mnav-generate">📝</a>
        <a href="#" onclick="showPage('workorders')" id="mnav-workorders">📂</a>
        <a href="#" onclick="showPage('dashboard')" id="mnav-dashboard">📊</a>
        <a href="#" onclick="showPage('vendors')" id="mnav-vendors">👷</a>
        <a href="#" onclick="showPage('settings')" id="mnav-settings">⚙️</a>
    </div>
    <div class="main-content">
        <div id="page-generate">
            <div class="page-title">📝 工单生成</div>
            <div class="card">
                <div class="card-header">粘贴工单信息</div>
                <div class="card-body">
                    <textarea class="form-control mb-2" id="ai-input" rows="4" placeholder="粘贴工单信息..."></textarea>
                    <button class="btn btn-primary btn-sm" onclick="analyzeWorkorder()">AI智能分析</button>
                </div>
            </div>
            <div class="card" id="analysis-result" style="display:none;">
                <div class="card-header">分析结果</div>
                <div class="card-body">
                    <div class="row g-2">
                        <div class="col-6"><label class="small text-muted">机构</label><input class="form-control form-control-sm" id="edit-dept"></div>
                        <div class="col-6"><label class="small text-muted">报修人</label><input class="form-control form-control-sm" id="edit-person"></div>
                        <div class="col-6"><label class="small text-muted">电话</label><input class="form-control form-control-sm" id="edit-phone"></div>
                        <div class="col-6"><label class="small text-muted">设备</label><select class="form-select form-select-sm" id="edit-device" onchange="onDeviceChange()">
                            <option>存取款一体机/ATM</option><option>高速大额存取款机</option><option>回单机/自助终端</option><option>综合版智能柜台</option><option>标准版智能柜台</option><option>网银一体机/LED走字屏</option><option>空调维护</option><option>零星维修</option><option>叫号机/宣传屏</option><option>征信查询机</option><option>其他</option>
                        </select></div>
                        <div class="col-6"><label class="small text-muted">运维商</label><select class="form-select form-select-sm" id="edit-vendor"></select></div>
                        <div class="col-12"><label class="small text-muted">故障描述</label><input class="form-control form-control-sm" id="edit-desc"></div>
                    </div>
                    <button class="btn btn-success btn-sm mt-2" onclick="confirmCreate()">确认生成工单</button>
                </div>
            </div>
            <div class="card" id="success-result" style="display:none;">
                <div class="card-header bg-success text-white">创建成功</div>
                <div class="card-body" id="success-content"></div>
            </div>
        </div>
        <div id="page-workorders" style="display:none;">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <div class="page-title mb-0">📂 工单管理</div>
                <div>
                    <button class="btn btn-outline-primary btn-sm" onclick="syncFromCloud()">🔄 同步</button>
                    <button class="btn btn-warning btn-sm" onclick="uploadToCloud()">☁️上传</button>
                </div>
            </div>
            <div class="d-flex flex-wrap gap-1 mb-2">
                <button class="btn btn-outline-secondary btn-sm" onclick="filterStatus('all')">全部</button>
                <button class="btn btn-outline-primary btn-sm" onclick="filterStatus('响应中')">响应中</button>
                <button class="btn btn-sm" style="color:#6f42c1;border-color:#6f42c1" onclick="filterStatus('审批中')">审批中</button>
                <button class="btn btn-outline-success btn-sm" onclick="filterStatus('已完成')">已完成</button>
            </div>
            <div class="card mb-2">
                <div class="card-body p-2">
                    <div class="d-flex gap-1 mb-2">
                        <input class="form-control form-control-sm" id="search-order" placeholder="搜索机构..." style="max-width:150px" placeholder="🔍 搜索机构...">
                        <input type="date" class="form-control form-control-sm" id="search-date-start">
                        <input type="date" class="form-control form-control-sm" id="search-date-end">
                        <input type="date" class="form-control form-control-sm" id="search-date-end">
                        <button class="btn btn-primary btn-sm" onclick="renderWorkorders()">查询</button>
                    </div>
                </div>
            </div>
            <div style="overflow-x:auto">
                <table class="table table-sm table-hover" id="workorder-table">
                    <thead><tr><th>工单号</th><th>机构</th><th>设备</th><th>故障</th><th>状态</th><th>运维商</th><th>时间</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-2">
                <span class="text-muted small" id="page-info"></span>
                <div>
                    <button class="btn btn-sm btn-outline-secondary" onclick="changePage(-1)">←</button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="changePage(1)">→</button>
                </div>
            </div>
        </div>
        <div id="page-dashboard" style="display:none;">
            <div class="page-title">📊 数据看板</div>
            <div class="card">
                <div class="card-body">
                    <div class="row text-center">
                        <div class="col-4"><div class="text-muted small">本月</div><h5 id="month-total">0</h5></div>
                        <div class="col-4"><div class="text-success small">完成</div><h5 class="text-success" id="month-done">0</h5></div>
                        <div class="col-4"><div class="text-warning small" onclick="showPendingDetail('month')" style="cursor:pointer">未完成</div><h5 class="text-warning" id="month-pending">0</h5></div>
                        <div class="col-4 mt-2"><div class="text-muted small">本周</div><h5 id="week-total">0</h5></div>
                        <div class="col-4 mt-2"><div class="text-success small">完成</div><h5 class="text-success" id="week-done">0</h5></div>
                        <div class="col-4 mt-2"><div class="text-warning small" onclick="showPendingDetail('week')" style="cursor:pointer">未完成</div><h5 class="text-warning" id="week-pending">0</h5></div>
                    </div>
                    <div class="text-center mt-2 border-top pt-2"><span class="text-muted">平均响应:</span><strong id="avg-response">0h</strong></div>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-md-6 mb-2"><div class="card"><div class="card-body p-2"><h6>📉 供应商工单分布</h6><div class="chart-container"><canvas id="chart-vendor" width="400" height="220"></canvas></div></div></div></div>
                <div class="col-12 col-md-6 mb-2"><div class="card"><div class="card-body p-2"><h6>🔔 供应商响应时长</h6><div class="chart-container"><canvas id="chart-response" width="400" height="220"></canvas></div></div></div></div>
            </div>
        </div>
        <div id="page-vendors" style="display:none;">
            <div class="page-title">👷 运维商</div>
            <div class="card">
                <table class="table table-sm mb-0" id="vendor-table"><thead><tr><th>设备类型</th><th>运维商</th><th>联系人</th><th>电话</th></tr></thead><tbody></tbody></table>
            </div>
        </div>
        <div id="page-settings" style="display:none;">
            <div class="page-title">⚙️ 系统设置</div>
            <div class="card mb-2">
                <div class="card-header">账号管理</div>
                <div class="card-body">
                    <div class="mb-2">
                        <button class="btn btn-primary btn-sm" onclick="showAddAccountModal()">+ 新增账号</button>
                        <button class="btn btn-outline-secondary btn-sm" onclick="showAccountList()">查看账号列表</button>
                    </div>
                    <table class="table table-sm" id="account-table">
                        <thead><tr><th>用户名</th><th>权限</th><th>归属运维商</th><th>操作</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            <div class="card mb-2">
                <div class="card-header">当前账号设置</div>
                <div class="card-body">
                    <div class="row g-2">
                        <div class="col-6"><label class="small">用户名</label><input class="form-control form-control-sm" id="setting-username"></div>
                        <div class="col-6"><label class="small">新密码</label><input type="password" class="form-control form-control-sm" id="setting-password"></div>
                    </div>
                    <button class="btn btn-primary btn-sm mt-2" onclick="saveSettings()">保存</button>
                </div>
            </div>
            <div class="card mb-2">
                <div class="card-header">云端同步</div>
                <div class="card-body">
                    <input class="form-control form-control-sm mb-2" id="gist-id" placeholder="Gist ID">
                    <button class="btn btn-primary btn-sm" onclick="saveGistId()">保存</button>
                </div>
            </div>
            <div class="card">
                <div class="card-header">数据安全</div>
                <div class="card-body">
                    <button class="btn btn-danger btn-sm" onclick="clearData()">清除所有数据</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 新增账号弹窗 -->
<div class="modal fade" id="addAccountModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h6 class="modal-title">新增账号</h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div class="mb-2"><label class="small">用户名</label><input class="form-control form-control-sm" id="new-account-username"></div>
                <div class="mb-2"><label class="small">密码</label><input type="password" class="form-control form-control-sm" id="new-account-password"></div>

                <div class="mb-2" id="vendor-select-div" style="display:none;"><label class="small">归属运维商</label><select class="form-select form-select-sm" id="new-account-vendor"></select></div>
                <button class="btn btn-primary btn-sm" onclick="addAccount()">保存</button>
            </div>

<div class="modal fade" id="pendingModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h6 class="modal-title" id="pendingModalTitle"></h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><table class="table table-sm" id="pending-table"><thead><tr><th>工单号</th><th>机构</th><th>设备</th><th>故障</th><th>报修时间</th><th>时长</th><th>状态</th></tr></thead><tbody></tbody></table></div></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js">

// 运维商"其他"设备类型：切换设备类型时自动更新状态选项
function handleDeviceTypeChange(deviceType) {
    var statusSelect = document.getElementById('edit-status');
    if (!statusSelect) return;
    var u = getCurrentUser();
    var isVendorOther = (u && u.role === 'vendor' && deviceType === '其他');
    var opts = statusSelect.options;
    for (var i = 0; i < opts.length; i++) {
        if (isVendorOther && opts[i].value === '待分配') {
            opts[i].text = '其他';
            opts[i].value = '其他';
            if (statusSelect.value === '待分配') statusSelect.value = '其他';
        } else if (opts[i].value === '其他') {
            opts[i].text = '待分配';
            opts[i].value = '待分配';
        }
    }
}

// 增强generateWorkorder：运维商"其他"类型时自动设置vendor为当前用户
var _origGenerateWorkorder = generateWorkorder;
generateWorkorder = function() {
    var u = getCurrentUser();
    var vendor = document.getElementById('edit-vendor').value;
    var device = document.getElementById('edit-device-type').value;
    var dept = document.getElementById('edit-dept').value;
    var desc = document.getElementById('edit-desc').value;
    var status = document.getElementById('edit-status').value;
    if (u && u.role === 'vendor' && device === '其他') { vendor = u.username; }
    if (!dept || !device) { alert('请填写完整信息'); return; }
    var now = new Date();
    var id = 'WO' + now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + String(Math.random()).slice(2,6);
    var o = {
        id: id, createTime: now.toISOString(), createBy: u ? u.username : 'admin',
        dept: dept, device: device, vendor: vendor, desc: desc,
        status: (u && u.role === 'vendor' && device === '其他') ? '其他' : status,
        responseTime: null, completeTime: null
    };
    workorders.push(o);
    saveWorkorders();
    renderWorkorders();
    bootstrap.Modal.getInstance(document.getElementById('generateModal')).hide();
    alert('工单 ' + id + ' 已生成');
    document.getElementById('edit-desc').value = '';
};

// showPage增强：进入生成页面时自动分析工单
var _origShowPage = showPage;
showPage = function(page) {
    _origShowPage(page);
    if (page === 'generate') {
        setTimeout(function() { analyzeWorkorder(); }, 100);
    }
};

// renderWorkorders增强：供应商角色只看自己的工单
var _origRenderWorkorders = renderWorkorders;
renderWorkorders = function() {
    var u = getCurrentUser();
    var kw = (document.getElementById('search-order') || {value:''}).value.trim().toLowerCase();
    var ds = (document.getElementById('search-date-start') || {value:''}).value;
    var de = (document.getElementById('search-date-end') || {value:''}).value;
    var list = workorders.filter(function(o) {
        if (u && u.role === 'vendor' && o.createBy !== u.username) return false;
        if (kw && o.id.toLowerCase().indexOf(kw) < 0 && (o.dept||'').toLowerCase().indexOf(kw) < 0 && (o.vendor||'').toLowerCase().indexOf(kw) < 0) return false;
        if (ds && o.createTime < ds) return false;
        if (de && o.createTime > de + 'T23:59:59') return false;
        return true;
    });
    list.sort(function(a,b){ return new Date(b.createTime) - new Date(a.createTime); });
    var html = '<table class="table table-sm table-hover mb-0"><thead><tr><th>工单号</th><th>创建时间</th><th>机构</th><th>设备类型</th><th>供应商</th><th>状态</th><th>操作</th></tr></thead><tbody>';
    if (list.length === 0) {
        html += '<tr><td colspan="7" class="text-center text-muted py-4">暂无数据</td></tr>';
    } else {
        list.forEach(function(o) {
            html += '<tr>';
            html += '<td><span class="text-primary fw-bold" style="cursor:pointer" onclick="showOrderDetail(\''+o.id+'\')">'+o.id+'</span></td>';
            html += '<td>'+new Date(o.createTime).toLocaleString('zh-CN',{hour12:false})+'</td>';
            html += '<td>'+o.dept+'</td>';
            html += '<td>'+o.device+'</td>';
            html += '<td>'+(o.vendor||'')+'</td>';
            html += '<td>'+getStatusHtml(o.status)+'</td>';
            html += '<td>';
            var u2 = getCurrentUser();
            if ((!u2 || u2.role === 'admin') && o.status !== '已完成') {
                html += '<button class="btn btn-xs btn-outline-primary me-1" onclick="showChangeStatus(\''+o.id+'\')">改状态</button>';
            }
            html += '<button class="btn btn-xs btn-outline-secondary" onclick="showOrderDetail(\''+o.id+'\')">详情</button>';
            html += '</td></tr>';
        });
    }
    html += '</tbody></table>';
    document.getElementById('workorder-list').innerHTML = html;
};

// renderDashboard增强：供应商角色只看自己的数据
var _origRenderDashboard = renderDashboard;
renderDashboard = function() {
    var u = getCurrentUser();
    var filtered = (u && u.role === 'vendor') ? workorders.filter(function(o){ return o.createBy === u.username; }) : workorders;
    var now = new Date();
    var ms = new Date(now.getFullYear(),now.getMonth(),1);
    var wa = new Date(now.getTime()-7*86400000);
    var mo = filtered.filter(function(o){ return new Date(o.createTime) >= ms; });
    var wo = filtered.filter(function(o){ return new Date(o.createTime) >= wa; });
    document.getElementById('month-total').textContent = mo.length;
    document.getElementById('month-done').textContent = mo.filter(function(o){ return o.status==='已完成'; }).length;
    document.getElementById('month-pending').textContent = mo.filter(function(o){ return o.status!=='已完成'; }).length;
    document.getElementById('week-total').textContent = wo.length;
    document.getElementById('week-done').textContent = wo.filter(function(o){ return o.status==='已完成'; }).length;
    document.getElementById('week-pending').textContent = wo.filter(function(o){ return o.status!=='已完成'; }).length;
    var done = filtered.filter(function(o){ return o.status==='已完成'&&o.completeTime; });
    if (done.length > 0) {
        var tot = done.reduce(function(s,o){ return s+(new Date(o.completeTime).getTime()-new Date(o.createTime).getTime()); }, 0);
        document.getElementById('avg-response').textContent = formatDuration(Math.round(tot/done.length));
    } else {
        document.getElementById('avg-response').textContent = '0h';
    }
    var vm = {};
    filtered.forEach(function(o){ var v=o.vendor||'未知'; vm[v]=(vm[v]||0)+1; });
    var vK = Object.keys(vm), vV = Object.values(vm);
    if (window.chartVendor) { try { window.chartVendor.destroy(); } catch(e){} window.chartVendor = null; }
    if (window.chartResponse) { try { window.chartResponse.destroy(); } catch(e){} window.chartResponse = null; }
    var cv = document.getElementById('chart-vendor');
    var cr = document.getElementById('chart-response');
    if (cv && cv.parentElement) {
        cv.parentElement.style.minHeight = '220px';
        window.chartVendor = new Chart(cv.getContext('2d'),{
            type:'bar',
            data:{labels:vK,datasets:[{label:'工单数',data:vV,backgroundColor:'#1976d2'}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
        });
    }
    var rm = {};
    filtered.filter(function(o){ return o.status==='已完成'&&o.completeTime; }).forEach(function(o){
        var v=o.vendor||'未知';
        var h=(new Date(o.completeTime).getTime()-new Date(o.createTime).getTime())/3600000;
        if(!rm[v])rm[v]=[];rm[v].push(h);
    });
    var rK = Object.keys(rm);
    var rV = rK.map(function(v){ var a=rm[v]; return Math.round(a.reduce(function(x,y){return x+y;},0)/a.length*10)/10; });
    if (cr && cr.parentElement) {
        cr.parentElement.style.minHeight = '220px';
        window.chartResponse = new Chart(cr.getContext('2d'),{
            type:'bar',
