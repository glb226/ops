// Supabase REST API 调用
async function supabaseGet(table) {
    const res = await fetch(SB_URL + '/rest/v1/' + table, {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    return res.json();
}

async function supabasePost(table, data) {
    const res = await fetch(SB_URL + '/rest/v1/' + table, {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(data)
    });
    return res.ok;
}

async function supabasePatch(table, data, match) {
    let url = SB_URL + '/rest/v1/' + table + '?';
    for(const key in match) url += key + '.eq.' + encodeURIComponent(match[key]) + '&';
    const res = await fetch(url, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(data)
    });
    return res.ok;
}

async function supabaseDelete(table, match) {
    let url = SB_URL + '/rest/v1/' + table + '?';
    for(const key in match) url += key + '.eq.' + encodeURIComponent(match[key]) + '&';
    const res = await fetch(url, {
        method: 'DELETE',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    return res.ok;
}

async function loadAccounts() { return await supabaseGet('accounts'); }
async function loadWorkorders() { return await supabaseGet('workorders'); }

async function saveAccount(account) {
    // 先删除同名账号
    await supabaseDelete('accounts', { username: account.username });
    return await supabasePost('accounts', account);
}

async function deleteAccountDB(username) { return await supabaseDelete('accounts', { username }); }

async function saveWorkorder(order) {
    await supabaseDelete('workorders', { id: order.id });

}

async function updateWorkorder(id, data) { return await supabasePatch('workorders', data, { id }); }
async function deleteWorkorderDB(id) { return await supabaseDelete('workorders', { id }); }

function getVendorNames() {

function getStatusHtml(status) { return '<span class="status-badge status-' + status + '">' + status + '</span>'; }

function formatDuration(ms) {
    if(!ms) return '-';
    const h = Math.floor(ms/3600000);
    const m = Math.floor((ms%3600000)/60000);
    return h > 24 ? Math.floor(h/24) + '天' + (h%24) + 'h' : h + 'h' + m + 'm';
}

function checkLogin() {
    const savedUser = localStorage.getItem('currentUser');
    if(savedUser) {
        currentUser = JSON.parse(savedUser);
        document.getElementById('login-page').style.display='none';
        document.getElementById('main-system').style.display='block';
        loadAllData();
    } else {
        document.getElementById('login-page').style.display='flex';
        document.getElementById('main-system').style.display='none';
        document.getElementById('login-hint').textContent='请登录';
    }
}

document.getElementById('login-form').onsubmit = async function(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errDiv = document.getElementById('login-error');
    btn.disabled = true;
    btn.textContent = '登录中...';
    errDiv.classList.add('d-none');
    
    const u = document.getElementById('login-username').value.trim();
    const p = document.getElementById('login-password').value.trim();
    
    try {
        const accounts = await loadAccounts();
        if(!Array.isArray(accounts) || accounts.length === 0) {
            // 首次登录
            const ok = await saveAccount({ username: u, password: p, role: 'admin', vendor: '' });
            if(ok) {
                currentUser = { username: u, role: 'admin', vendor: '' };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                alert('设置成功！');
                document.getElementById('login-page').style.display='none';
                document.getElementById('main-system').style.display='block';
                loadAllData();
            }
        } else {
            const account = accounts.find(a => a.username === u && a.password === p);
            if(account) {
                currentUser = account;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                document.getElementById('login-page').style.display='none';
                document.getElementById('main-system').style.display='block';
                loadAllData();
            } else {
                errDiv.textContent = '用户名或密码错误';
                errDiv.classList.remove('d-none');
            }
        }
    } catch(err) {
        errDiv.textContent = '连接失败，请检查网络';
        errDiv.classList.remove('d-none');
        console.error(err);
    }
    
    btn.disabled = false;
    btn.textContent = '登录';
};

async function saveSettings() {

            if(p) currentUser.password = p;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));

    const tbody = document.querySelector('#account-table tbody');
    tbody.innerHTML = (Array.isArray(accounts) && accounts.length) ? accounts.map(a =>
        '<tr><td>'+a.username+'</td><td>'+(a.role==='admin'?'<span class="badge bg-primary">管理</span>':'<span class="badge bg-success">供应商</span>')+'</td><td>'+(a.vendor||'-')+'</td><td><button class="btn btn-danger btn-sm py-0" onclick="deleteAccount(\''+a.username+'\')">删除</button></td></tr>'
    ).join('') : '<tr><td colspan="4" class="text-muted text-center">暂无账号</td></tr>';
}

async function deleteAccount(username) {
    if(!confirm('确定删除账号 '+username+' ？')) return;
    await deleteAccountDB(username);
    showAccountList();
}

async function clearData() {
    if(!confirm('确定要清除所有数据吗？')) return;
    for(const o of workorders) await deleteWorkorderDB(o.id);
    await loadAllData();
    alert('数据已清除');
}

function generateOrderNo() {
    const n = new Date();
    return 'WO' + n.getFullYear() + String(n.getMonth()+1).padStart(2,'0') + String(n.getDate()).padStart(2,'0') + String(Math.random()).slice(2,6);
}

function onDeviceChange() {
    const d = document.getElementById('edit-device').value;
    const s = document.getElementById('edit-vendor');
    if(currentUser && currentUser.role === 'vendor' && currentUser.vendor) {
        s.innerHTML = '<option value="'+currentUser.vendor+'">'+currentUser.vendor+'</option>';
    } else {
        s.innerHTML = vendors.filter(x => d.includes(x.type.split('/')[0]) || x.type === d || x.type === '其他' || x.type === '零星维修').map(v => '<option value="'+v.vendor+'">'+v.vendor+'</option>').join('');
    }
}

function analyzeWorkorder() {
    const i = document.getElementById('ai-input').value;
    if(!i.trim()) { alert('请输入工单信息'); return; }
    let dept='', person='', phone='', device='其他', desc='';
    const dm = i.match(/报修部门[：:]\s*(.+?)(?:\n|$)/); if(dm) dept = dm[1].trim();
    const pm = i.match(/报修人[及和]*联系电话[：:]\s*(.+?)(?:\n|$)/);
    if(pm) { const pp = pm[1].trim(); const m = pp.match(/(\d{11})/); if(m) { phone = m[1]; person = pp.replace(m[1],'').replace(/[，。]/g,'').trim(); } else person = pp; }
    if(!phone) { const m = i.match(/(\d{11})/); if(m) phone = m[1]; }
    const d2 = i.match(/具体报修项目[：:]\s*(.+?)(?:\n|$)/); if(d2) desc = d2[1].trim();
    const l = i.toLowerCase();
    if(l.includes('atm') || l.includes('取款机')) device = '存取款一体机/ATM';
    else if(l.includes('高速') || l.includes('大额')) device = '高速大额存取款机';
    else if(l.includes('回单') || l.includes('自助终端')) device = '回单机/自助终端';
    else if(l.includes('综合版')) device = '综合版智能柜台';
    else if(l.includes('标准版') || l.includes('智能柜台')) device = '标准版智能柜台';
    else if(l.includes('led') || l.includes('显示屏')) device = '网银一体机/LED走字屏';
    else if(l.includes('空调')) device = '空调维护';
    else if(l.includes('叫号') || l.includes('宣传屏')) device = '叫号机/宣传屏';
    else if(l.includes('征信') || l.includes('查询机')) device = '征信查询机';
    else if(l.includes('零星') || l.includes('维修')) device = '零星维修';
    
    analyzedData = { dept, person, phone, device, desc };
    document.getElementById('edit-dept').value = dept || '';
    document.getElementById('edit-person').value = person || '';
    document.getElementById('edit-phone').value = phone || '';
    document.getElementById('edit-device').value = device;
    document.getElementById('edit-desc').value = desc || '';
    onDeviceChange();
    document.getElementById('analysis-result').style.display = 'block';
    document.getElementById('success-result').style.display = 'none';
}

async function confirmCreate() {
    if(!analyzedData) return;
    let vendor = document.getElementById('edit-vendor').value;
    if(currentUser && currentUser.role === 'vendor') vendor = currentUser.vendor;
    
    const order = {
        id: generateOrderNo(),
        dept: document.getElementById('edit-dept').value,
        person: document.getElementById('edit-person').value,
        phone: document.getElementById('edit-phone').value,
        device: document.getElementById('edit-device').value,
        description: document.getElementById('edit-desc').value,
        vendor: vendor,
        status: '响应中',
        create_time: new Date().toISOString(),
        assign_time: new Date().toISOString(),
        complete_time: null,
        created_by: currentUser ? currentUser.username : 'system'
    };
    
    if(await saveWorkorder(order)) {
        await loadAllData();
        document.getElementById('analysis-result').style.display = 'none';
        document.getElementById('ai-input').value = '';
        document.getElementById('success-content').innerHTML = '<p>工单号：<strong>'+order.id+'</strong></p><p>机构：'+order.dept+'</p><p>设备：'+order.device+'</p><p>运维商：'+order.vendor+'</p><p>状态：'+order.status+'</p>';
        document.getElementById('success-result').style.display = 'block';
        analyzedData = null;
    }
}

function getFilteredOrders() {
    let filtered = workorders;
    if(currentUser && currentUser.role === 'vendor' && currentUser.vendor) filtered = filtered.filter(o => o.vendor === currentUser.vendor);
    const s = document.getElementById('search-order').value.toLowerCase();
    return filtered.filter(o => {
        if(currentFilter !== 'all' && o.status !== currentFilter) return false;
        if(s && !(o.dept || '').toLowerCase().includes(s)) return false;
        return true;
    });
}

function renderWorkorders() {
    const filtered = getFilteredOrders();
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
    if(currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * PAGE_SIZE;
    const pageData = filtered.slice(start, start + PAGE_SIZE);
    const isAdmin = !currentUser || currentUser.role === 'admin';
    
    document.querySelector('#workorder-table tbody').innerHTML = pageData.map(o => {
        const ct = new Date(o.create_time);
        const desc = (o.description || '').substring(0, 12);
        let statusCell = getStatusHtml(o.status);
        if(isAdmin) {
            const color = o.status === '响应中' ? '#007bff' : o.status === '审批中' ? '#6f42c1' : '#28a745';
            statusCell = '<select class="status-select" style="color:'+color+'" onchange="handleStatusChange(\''+o.id+'\', this.value)">'+
                '<option value="响应中"'+(o.status==='响应中'?' selected':'')+'>响应中</option>'+
                '<option value="审批中"'+(o.status==='审批中'?' selected':'')+'>审批中</option>'+
                '<option value="已完成"'+(o.status==='已完成'?' selected':'')+'>已完成</option></select>';
        }
        return '<tr><td>'+o.id+'</td><td>'+o.dept+'</td><td>'+o.device+'</td><td>'+desc+'</td><td>'+statusCell+'</td><td>'+(o.vendor||'-')+'</td><td>'+ct.toLocaleDateString()+'</td></tr>';
    }).join('');
    document.getElementById('page-info').textContent = filtered.length + '条 第' + currentPage + '/' + totalPages + '页';
}

async function handleStatusChange(id, status) {
    const data = { status };
    if(status === '已完成') data.complete_time = new Date().toISOString();
    await updateWorkorder(id, data);
    await loadAllData();
}

function changePage(delta) {
    const filtered = getFilteredOrders();
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
    currentPage = Math.max(1, Math.min(totalPages, currentPage + delta));
    renderWorkorders();
}

function filterStatus(s) { currentFilter = s; currentPage = 1; renderWorkorders(); }

function renderDashboard() {
    let filtered = workorders;
    if(currentUser && currentUser.role === 'vendor' && currentUser.vendor) filtered = filtered.filter(o => o.vendor === currentUser.vendor);
    
    const now = new Date();
    const ms = new Date(now.getFullYear(), now.getMonth(), 1);
    const wa = new Date(now.getTime() - 7 * 86400000);
    const mo = filtered.filter(o => new Date(o.create_time) >= ms);
    const wo = filtered.filter(o => new Date(o.create_time) >= wa);
    
    document.getElementById('month-total').textContent = mo.length;
    document.getElementById('month-done').textContent = mo.filter(o => o.status === '已完成').length;
    document.getElementById('month-pending').textContent = mo.filter(o => o.status !== '已完成').length;
    document.getElementById('week-total').textContent = wo.length;
    document.getElementById('week-done').textContent = wo.filter(o => o.status === '已完成').length;
    document.getElementById('week-pending').textContent = wo.filter(o => o.status !== '已完成').length;
    
    const done = filtered.filter(o => o.status === '已完成' && o.complete_time);
    if(done.length > 0) {
        const avg = done.reduce((s, o) => s + (new Date(o.complete_time).getTime() - new Date(o.create_time).getTime()), 0) / done.length;
        document.getElementById('avg-response').textContent = formatDuration(Math.round(avg));
    } else {
        document.getElementById('avg-response').textContent = '0h';
    }
    
    const vm = {};
    filtered.forEach(o => { const v = o.vendor || '未知'; vm[v] = (vm[v] || 0) + 1; });
    if(window.chartVendor) window.chartVendor.destroy();
    window.chartVendor = new Chart(document.getElementById('chart-vendor').getContext('2d'), {
        type: 'bar', data: { labels: Object.keys(vm), datasets: [{ data: Object.values(vm), backgroundColor: '#1976d2' }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
    });
    
    const rm = {};
    filtered.filter(o => o.status === '已完成' && o.complete_time).forEach(o => {
        const v = o.vendor || '未知';
        const h = (new Date(o.complete_time).getTime() - new Date(o.create_time).getTime()) / 3600000;
        if(!rm[v]) rm[v] = []; rm[v].push(h);
    });
    if(window.chartResponse) window.chartResponse.destroy();
    window.chartResponse = new Chart(document.getElementById('chart-response').getContext('2d'), {
        type: 'bar', data: { labels: Object.keys(rm), datasets: [{ data: Object.keys(rm).map(v => Math.round(rm[v].reduce((a,b) => a+b, 0) / rm[v].length * 10) / 10), backgroundColor: '#28a745' }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
    });
}

function renderVendors() {
    document.querySelector('#vendor-table tbody').innerHTML = vendors.map(v => '<tr><td>'+v.type+'</td><td>'+v.vendor+'</td><td>'+v.contact+'</td><td>'+v.phone+'</td></tr>').join('');
}

async function syncFromCloud() {
    await loadAllData();
    alert('同步成功，共 ' + workorders.length + ' 条工单');
}

function showPage(page) {
    ['generate', 'workorders', 'dashboard', 'vendors', 'settings'].forEach(p => {
        document.getElementById('page-' + p).style.display = 'none';
        document.getElementById('nav-' + p).classList.remove('active');
    });
    document.getElementById('page-' + page).style.display = 'block';
    document.getElementById('nav-' + page).classList.add('active');
    
    if(page === 'workorders') renderWorkorders();
    else if(page === 'dashboard') renderDashboard();
    else if(page === 'vendors') renderVendors();
    else if(page === 'settings') {
        if(currentUser) document.getElementById('setting-username').value = currentUser.username || '';
        showAccountList();
        document.getElementById('account-manage-card').style.display = (currentUser && currentUser.role === 'vendor') ? 'none' : 'block';
    } else if(page === 'generate') {
        onDeviceChange();
    }
}

checkLogin();
